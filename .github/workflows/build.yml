name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk seance.apk

      - uses: actions/upload-artifact@v4
        with:
          name: seance-apk
          path: seance.apk
